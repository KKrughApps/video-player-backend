<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Embedded Animation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f8f9fa;
        }
        .video-container {
            width: 100%;
            max-width: 640px;
            margin: 20px auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            border-radius: 8px;
            overflow: hidden;
        }
        #animationVideo {
            width: 100%;
            height: auto;
            display: block;
        }
        .controls {
            display: flex;
            justify-content: center;
            margin-top: 10px;
            gap: 10px;
        }
        .language-btn {
            padding: 8px 16px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .language-btn:hover {
            background-color: #0056b3;
        }
        .status-container {
            width: 100%;
            max-width: 640px;
            margin: 10px auto;
            padding: 10px;
            border-radius: 4px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <div class="video-container">
        <video id="animationVideo" controls>
            <source id="videoSource" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>
    <div class="controls">
        <button class="language-btn" onclick="switchLanguage('en')">English</button>
        <button class="language-btn" onclick="switchLanguage('es')">Spanish</button>
    </div>
    <script src="/public/script.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const id = window.location.pathname.split('/').pop();
        const lang = urlParams.get('lang') || 'en';
        
        // Add a status display
        const statusDiv = document.createElement('div');
        statusDiv.className = 'status-container';
        statusDiv.style.backgroundColor = '#f8f9fa';
        statusDiv.style.border = '1px solid #ddd';
        
        document.body.appendChild(statusDiv);
        statusDiv.textContent = 'Loading video...';
        
        function switchLanguage(newLang) {
            window.location.href = `/embed/${id}?lang=${newLang}`;
        }
        
        fetch(`/api/video/${id}?lang=${lang}`)
            .then(response => {
                if (!response.ok) {
                    throw new Error(`Error ${response.status}: ${response.statusText}`);
                }
                return response.json();
            })
            .then(data => {
                console.log('Video URL:', data.url);
                statusDiv.textContent = `Attempting to load: ${data.url}`;
                
                const videoSource = document.getElementById('videoSource');
                videoSource.src = data.url;
                
                const video = document.getElementById('animationVideo');
                
                // Add event listeners for video loading
                video.addEventListener('loadeddata', () => {
                    statusDiv.textContent = 'Video loaded successfully!';
                    statusDiv.style.backgroundColor = '#d4edda';
                    statusDiv.style.border = '1px solid #c3e6cb';
                });
                
                video.addEventListener('error', (e) => {
                    console.error('Video error:', e);
                    statusDiv.textContent = `Error loading video. The video file might not exist or might be in an unsupported format.`;
                    statusDiv.style.backgroundColor = '#f8d7da';
                    statusDiv.style.border = '1px solid #f5c6cb';
                });
                
                // Now load the video
                video.load();
            })
            .catch(err => {
                console.error('Error loading video:', err);
                statusDiv.textContent = `Error: ${err.message}`;
                statusDiv.style.backgroundColor = '#f8d7da';
                statusDiv.style.border = '1px solid #f5c6cb';
            });
    </script>
</body>
</html>
