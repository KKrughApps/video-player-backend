<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        button { padding: 5px 10px; margin: 0 5px; }
        .add-section { margin-bottom: 20px; }
    </style>
</head>
<body>
    <h1>Add New Animation</h1>
    <div class="add-section">
        <form action="/admin/add" method="POST" enctype="multipart/form-data">
            <p><label>Name:</label><br><input type="text" name="name" required></p>
            <p><label>Video File:</label><br><input type="file" name="video" accept="video/mp4"></p>
            <p><label>Voiceover Text:</label><br><textarea name="voiceoverText" rows="5" cols="50"></textarea></p>
            <p><label>Sets/Reps/Duration:</label><br><input type="text" name="setsRepsDuration"></p>
            <p><label>Reminder:</label><br><input type="text" name="reminder"></p>
            <p><label><input type="checkbox" name="twoSided"> Is this two-sided?</label></p>
            <button type="submit">Add Animation</button>
        </form>
    </div>

    <h2>Existing Animations</h2>
    <table id="animationsTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Sets/Reps/Duration</th>
                <th>Reminder</th>
                <th>Two-Sided</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script src="/public/js/dashboard.js"></script>
</body>
</html>
