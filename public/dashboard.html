<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | Video Management System</title>
  <!-- Import Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Import Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary-color: #2563eb;
      --primary-hover: #1d4ed8;
      --primary-light: #dbeafe;
      --background-light: #f9fafb;
      --text-dark: #1f2937;
      --border-color: #e5e7eb;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--background-light);
      color: var(--text-dark);
      padding: 20px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
    }
    h1, h2 {
      margin-bottom: 15px;
    }
    .upload-form {
      background: #fff;
      padding: 20px;
      border: 1px solid var(--border-color);
      border-radius: 4px;
      margin-bottom: 20px;
    }
    .upload-form label {
      display: block;
      margin-bottom: 5px;
      font-weight: 500;
    }
    .upload-form input[type="text"],
    .upload-form input[type="file"],
    .upload-form textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid var(--border-color);
      border-radius: 4px;
    }
    .upload-form input[type="checkbox"] {
      margin-right: 5px;
    }
    .upload-form button {
      padding: 10px 20px;
      background: var(--primary-color);
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .upload-form button:hover {
      background: var(--primary-hover);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Admin Dashboard</h1>
    <h2>Upload New Animation</h2>
    <!-- Update the form action to match the existing server route -->
    <form class="upload-form" action="/admin/upload" method="POST" enctype="multipart/form-data">
      <label for="name">Animation Name:</label>
      <input type="text" id="name" name="name" required>
      
      <label for="videoFile">Select Video File:</label>
      <input type="file" id="videoFile" name="videoFile" accept="video/*" required>
      
      <label for="voiceoverText">Voiceover Text:</label>
      <textarea id="voiceoverText" name="voiceoverText" rows="3" required></textarea>
      
      <label for="setsRepsDuration">Sets/Reps Duration:</label>
      <input type="text" id="setsRepsDuration" name="setsRepsDuration">
      
      <label for="reminder">Reminder:</label>
      <input type="text" id="reminder" name="reminder">
      
      <label>
        <input type="checkbox" id="twoSided" name="twoSided">
        Two Sided
      </label>
      
      <button type="submit">Upload Animation</button>
    </form>
    
    <!-- Additional dashboard content, e.g., list of existing animations -->
    <h2>Existing Animations</h2>
    <div id="animations-list">
      <!-- Animations list will be rendered here -->
    </div>
  </div>
</body>
</html>
